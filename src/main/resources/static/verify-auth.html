<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Account Verification</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <main class="container">
      <section class="glass section">
        <div class="section-head">
          <h2>Account Verification</h2>
          <p id="status">Verifying, please wait...</p>
        </div>
        <a class="btn primary" href="/">Back to home</a>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      if (!token) {
        statusEl.textContent = "Missing verification token. Please return to home.";
      } else {
        fetch("/api/auth/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
        })
          .then((res) => res.json().then((data) => ({ ok: res.ok, data })))
          .then(({ ok, data }) => {
            if (!ok) throw new Error(data.error || "Verification failed");
            statusEl.textContent = "Verified! You can now log in.";
          })
          .catch((err) => {
            statusEl.textContent = err.message;
          });
      }
    </script>
  </body>
</html>
