<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SubREADY · 訂閱達人</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --white: #FFFFFF;
    --bg: #F8FAFC;
    --slate: #1F2937;
    --cool: #6B7280;
    --indigo: #6366F1;
    --indigo-light: #EEF2FF;
    --indigo-dark: #4F46E5;
    --emerald: #10B981;
    --emerald-light: #ECFDF5;
    --rose: #F43F5E;
    --rose-light: #FFF1F2;
    --amber: #F59E0B;
    --amber-light: #FFFBEB;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.08), 0 2px 4px -2px rgba(0,0,0,0.06);
    --shadow-lg: 0 10px 24px -3px rgba(0,0,0,0.10), 0 4px 8px -4px rgba(0,0,0,0.06);
    --shadow-xl: 0 20px 40px -6px rgba(0,0,0,0.12), 0 8px 16px -6px rgba(0,0,0,0.08);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;
  }
  html, body, #root { height: 100%; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--slate);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Keyframe animations ── */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.93) translateY(12px); }
    to   { opacity: 1; transform: scale(1)   translateY(0); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-6px); }
    40%     { transform: translateX(6px); }
    60%     { transform: translateX(-4px); }
    80%     { transform: translateX(4px); }
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.35); }
    50%     { box-shadow: 0 0 0 10px rgba(99,102,241,0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  @keyframes checkDraw {
    from { stroke-dashoffset: 40; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes countUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes bgFloat {
    0%,100% { transform: translateY(0) rotate(0deg); }
    33%     { transform: translateY(-14px) rotate(2deg); }
    66%     { transform: translateY(8px) rotate(-1.5deg); }
  }

  .animate-fade-slide-up   { animation: fadeSlideUp 0.45s cubic-bezier(.22,.68,0,1.2) both; }
  .animate-fade-in         { animation: fadeIn 0.3s ease both; }
  .animate-scale-in        { animation: scaleIn 0.35s cubic-bezier(.22,.68,0,1.2) both; }
  .animate-shake           { animation: shake 0.4s ease; }
  .animate-spin            { animation: spin 0.8s linear infinite; }
  .animate-pulse-ring      { animation: pulse 2s infinite; }

  /* ── Card hover ── */
  .sub-card {
    transition: transform 0.22s ease, box-shadow 0.22s ease;
  }
  .sub-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-xl) !important;
  }
  .sub-card .action-icons { opacity: 0; transition: opacity 0.18s ease; }
  .sub-card:hover .action-icons { opacity: 1; }

  /* ── Button hover ── */
  .btn-primary {
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  }
  .btn-primary:hover {
    transform: scale(1.04);
    box-shadow: 0 6px 18px rgba(99,102,241,0.35);
    background: var(--indigo-dark) !important;
  }
  .btn-primary:active { transform: scale(0.98); }

  .btn-google {
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .btn-google:hover {
    transform: scale(1.03);
    box-shadow: var(--shadow-lg) !important;
  }

  /* ── Input focus ── */
  .input-field {
    transition: border-color 0.18s, box-shadow 0.18s;
    outline: none;
    border: 1.5px solid #E5E7EB;
  }
  .input-field:focus {
    border-color: var(--indigo);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.12), inset 0 1px 3px rgba(99,102,241,0.06);
  }
  .input-field.error {
    border-color: var(--rose);
    box-shadow: 0 0 0 3px rgba(244,63,94,0.10);
  }

  /* ── Toggle switch ── */
  .toggle-track {
    transition: background 0.2s ease;
  }
  .toggle-thumb {
    transition: transform 0.2s cubic-bezier(.22,.68,0,1.5);
  }

  /* ── Overlay ── */
  .modal-overlay {
    animation: fadeIn 0.25s ease both;
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
  }

  /* ── Staggered list items ── */
  .stagger-item { animation: fadeSlideUp 0.4s cubic-bezier(.22,.68,0,1.2) both; }
  .stagger-item:nth-child(1)  { animation-delay: 0.05s; }
  .stagger-item:nth-child(2)  { animation-delay: 0.10s; }
  .stagger-item:nth-child(3)  { animation-delay: 0.15s; }
  .stagger-item:nth-child(4)  { animation-delay: 0.20s; }
  .stagger-item:nth-child(5)  { animation-delay: 0.25s; }
  .stagger-item:nth-child(6)  { animation-delay: 0.30s; }
  .stagger-item:nth-child(7)  { animation-delay: 0.35s; }
  .stagger-item:nth-child(8)  { animation-delay: 0.40s; }

  /* ── Odometer-like number ── */
  .odometer { animation: countUp 0.6s cubic-bezier(.22,.68,0,1.2) both; }

  /* ── Toast ── */
  .toast {
    animation: fadeSlideUp 0.35s cubic-bezier(.22,.68,0,1.2) both;
  }
  .toast.exit {
    animation: fadeSlideUp 0.3s cubic-bezier(.22,.68,0,1.2) reverse both;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 9999px; }

  /* ── bg blobs on login ── */
  .blob {
    animation: bgFloat 8s ease-in-out infinite;
    filter: blur(40px);
    opacity: 0.55;
  }
  .blob2 { animation-delay: -3s; }
  .blob3 { animation-delay: -5.5s; }

  /* ── Avatar menu ── */
  .avatar-menu {
    animation: scaleIn 0.22s cubic-bezier(.22,.68,0,1.2) both;
    transform-origin: top right;
  }

  /* ── Check SVG ── */
  .check-path {
    stroke-dasharray: 40;
    stroke-dashoffset: 40;
    animation: checkDraw 0.4s 0.1s ease forwards;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ══════════════════════════════════════════════
   MOCK DATA
══════════════════════════════════════════════ */
const SERVICES = ["Netflix","Spotify","YouTube Premium","Adobe Creative Cloud","Apple iCloud","Microsoft 365","Disney+","Amazon Prime","Notion","Figma","Linear","GitHub","Slack","Dropbox","ChatGPT Plus","NordVPN","1Password","Duolingo Plus","Nintendo Switch Online","PlayStation Plus"];
const SERVICE_COLORS = {
  "Netflix":["#E50914","#141414"],"Spotify":["#1DB954","#191414"],"YouTube Premium":["#FF0000","#282828"],
  "Adobe Creative Cloud":["#FF0000","#2C2C2C"],"Apple iCloud":["#007AFF","#F5F5F7"],"Microsoft 365":["#D83B01","#0078D4"],
  "Disney+":["#1C3F94","#0FC1FA"],"Amazon Prime":["#00A8E0","#232F3E"],"Notion":["#000000","#FFFFFF"],
  "Figma":["#F24E1E","#0ACF83"],"Linear":["#5E6AD2","#1A1A2E"],"GitHub":["#24292E","#586069"],
  "Slack":["#4A154B","#36C5F0"],"Dropbox":["#0061FF","#E2F0FF"],"ChatGPT Plus":["#00A67E","#343541"],
  "NordVPN":["#4687FF","#002F87"],"1Password":["#1A8CFF","#0B4D99"],"Duolingo Plus":["#58CC02","#1CB0F6"],
  "Nintendo Switch Online":["#E60012","#ACACAC"],"PlayStation Plus":["#003087","#0070D1"],
};
const MOCK_SUBS = [];

/* ══════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════ */
function daysUntil(dateStr) {
  const now = new Date(); now.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}
function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('zh-TW', { month:'short', day:'numeric' });
}
function getInitials(name) { return name.charAt(0).toUpperCase(); }
function getServiceColors(name) {
  return SERVICE_COLORS[name] || ["#6366F1","#4F46E5"];
}
function genId() { return Date.now() + Math.random(); }

const TOKEN_KEY = "subready_token";
const getToken = () => localStorage.getItem(TOKEN_KEY);
const setToken = (token) => localStorage.setItem(TOKEN_KEY, token);
const clearToken = () => localStorage.removeItem(TOKEN_KEY);

const authHeaders = () => {
  const token = getToken();
  return token ? { Authorization: `Bearer ${token}` } : {};
};

const decodeJwt = (token) => {
  try {
    const payload = token.split(".")[1];
    const decoded = atob(payload.replace(/-/g, "+").replace(/_/g, "/"));
    return JSON.parse(decoded);
  } catch {
    return null;
  }
};

function normalizeFromApi(sub) {
  return {
    id: sub.id,
    name: sub.name || "",
    price: sub.price ?? 0,
    cycle: sub.period === "YEARLY" ? "年" : "月",
    nextDate: sub.nextBillingDate || "",
    remind: (sub.noticeDays ?? 0) > 0,
    currency: sub.currency || "TWD",
    noticeDays: sub.noticeDays ?? 0,
    status: sub.status || "ACTIVE",
    lastStatusNote: sub.lastStatusNote || "",
    lastStatusAt: sub.lastStatusAt || "",
  };
}

function normalizeToApi(form) {
  return {
    name: form.name,
    price: Number(form.price),
    currency: form.currency || "TWD",
    nextBillingDate: form.nextDate,
    period: form.cycle === "年" ? "YEARLY" : "MONTHLY",
    noticeDays: form.remind ? Number(form.noticeDays || 7) : 0,
  };
}

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
function Toast({ message, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const cfg = {
    success: { bg:"#ECFDF5", border:"#10B981", icon:"✓", color:"#065F46" },
    error:   { bg:"#FFF1F2", border:"#F43F5E", icon:"✕", color:"#881337" },
    info:    { bg:"#EEF2FF", border:"#6366F1", icon:"ℹ", color:"#3730A3" },
  }[type] || { bg:"#F8FAFC", border:"#6B7280", icon:"•", color:"#1F2937" };
  return (
    <div className="toast" style={{
      position:"fixed", bottom:28, right:28, zIndex:9999,
      background: cfg.bg, border:`1.5px solid ${cfg.border}`,
      borderRadius:12, padding:"13px 18px", display:"flex", alignItems:"center", gap:10,
      boxShadow:"0 8px 24px rgba(0,0,0,0.10)", minWidth:240, maxWidth:340,
    }}>
      <span style={{ fontSize:16, color: cfg.border, fontWeight:700 }}>{cfg.icon}</span>
      <span style={{ fontSize:14, fontWeight:500, color: cfg.color }}>{message}</span>
    </div>
  );
}

/* ══════════════════════════════════════════════
   SERVICE LOGO
══════════════════════════════════════════════ */
function ServiceLogo({ name, size=44 }) {
  const [c1, c2] = getServiceColors(name);
  return (
    <div style={{
      width: size, height: size, borderRadius: size*0.33,
      background: `linear-gradient(135deg, ${c1}, ${c2})`,
      display:"flex", alignItems:"center", justifyContent:"center",
      fontFamily:"'DM Mono', monospace",
      fontWeight: 500, fontSize: size*0.42, color:"#fff",
      letterSpacing: "-0.03em",
      boxShadow: `0 2px 8px ${c1}55`,
      flexShrink: 0,
    }}>
      {getInitials(name)}
    </div>
  );
}

/* ══════════════════════════════════════════════
   OVERVIEW CARDS
══════════════════════════════════════════════ */
function OverviewCards({ subs }) {
  const total = subs.reduce((a,s) => a + (s.cycle==="月" ? s.price : Math.round(s.price/12)), 0);
  const expiring = subs.filter(s => daysUntil(s.nextDate) <= 7).length;
  const avg = subs.length ? Math.round(total / subs.length) : 0;

  const cards = [
    { label:"本月總支出", value:`NT$ ${total.toLocaleString()}`, sub:"每月訂閱費用", color:"var(--indigo)", bg:"var(--indigo-light)", icon:"💳" },
    { label:"即將到期", value:`${expiring} 項`, sub:"7 天內需續費", color:"var(--rose)", bg:"var(--rose-light)", icon:"⏰" },
    { label:"訂閱數量", value:`${subs.length} 項`, sub:`平均 NT$ ${avg}/項`, color:"var(--emerald)", bg:"var(--emerald-light)", icon:"📦" },
  ];

  return (
    <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:16, marginBottom:28 }}>
      {cards.map((c,i) => (
        <div key={c.label} className="stagger-item" style={{
          background:"var(--white)", borderRadius:"var(--radius-lg)", padding:"22px 22px 18px",
          boxShadow:"var(--shadow-md)", border:"1px solid rgba(0,0,0,0.04)",
        }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
            <span style={{ fontSize:13, fontWeight:600, color:"var(--cool)", letterSpacing:"0.02em", textTransform:"uppercase" }}>{c.label}</span>
            <span style={{ fontSize:22, background:c.bg, width:38, height:38, borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center" }}>{c.icon}</span>
          </div>
          <div className="odometer" style={{ fontSize:28, fontWeight:800, color: c.color, lineHeight:1, marginBottom:5, fontFamily:"'DM Mono', monospace" }}>{c.value}</div>
          <div style={{ fontSize:12.5, color:"var(--cool)", fontWeight:500 }}>{c.sub}</div>
        </div>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════
   SUBSCRIPTION CARD
══════════════════════════════════════════════ */
function SubCard({ sub, onEdit, onDelete }) {
  const days = daysUntil(sub.nextDate);
  const urgent = days <= 7;
  const dateColor = urgent ? "var(--rose)" : "var(--cool)";
  const dateBg = urgent ? "var(--rose-light)" : "transparent";
  const statusLabel = (sub.status || "ACTIVE").toUpperCase();
  const statusColor = statusLabel === "ACTIVE" ? "var(--emerald)" : statusLabel === "CANCELED" ? "var(--rose)" : "var(--amber)";
  const statusBg = statusLabel === "ACTIVE" ? "var(--emerald-light)" : statusLabel === "CANCELED" ? "var(--rose-light)" : "var(--amber-light)";
  const statusText = {
    ACTIVE: "啟用中",
    CANCELED: "已取消",
    PAYMENT_FAILED: "付款失敗",
    PENDING_DETAILS: "待補資料",
  }[statusLabel] || "狀態未知";

  return (
    <div className="sub-card stagger-item" style={{
      background:"var(--white)", borderRadius:"var(--radius-lg)", padding:"18px 20px",
      boxShadow:"var(--shadow-md)", border:"1px solid rgba(0,0,0,0.04)",
      display:"flex", alignItems:"center", gap:16, cursor:"default",
    }}>
      <ServiceLogo name={sub.name} size={46} />
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontWeight:700, fontSize:15, color:"var(--slate)", marginBottom:4, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{sub.name}</div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{
            fontSize:12, fontWeight:600, color: dateColor,
            background: dateBg, borderRadius:6, padding: urgent?"2px 7px":"0",
            transition:"all 0.2s",
          }}>
            {urgent ? `⚠ ${days <= 0 ? "今日" : days+"天後"}到期` : `下次扣款 ${formatDate(sub.nextDate)}`}
          </span>
          {sub.remind && <span style={{ fontSize:11, color:"var(--indigo)", background:"var(--indigo-light)", borderRadius:5, padding:"1px 6px", fontWeight:600 }}>提醒</span>}
          <span style={{ fontSize:11, color:statusColor, background:statusBg, borderRadius:5, padding:"1px 6px", fontWeight:700 }}>
            {statusText}
          </span>
        </div>
        {(sub.lastStatusAt || sub.lastStatusNote) && (
          <div style={{ fontSize:11.5, color:"var(--cool)", marginTop:6 }}>
            {sub.lastStatusAt ? `更新日 ${formatDate(sub.lastStatusAt)}` : "更新日 -"}
            {sub.lastStatusNote ? ` · ${sub.lastStatusNote}` : ""}
          </div>
        )}
      </div>
      <div style={{ textAlign:"right", flexShrink:0 }}>
        <div style={{ fontSize:16, fontWeight:800, color:"var(--slate)", fontFamily:"'DM Mono', monospace" }}>
          {sub.currency || "TWD"} {Number(sub.price || 0).toLocaleString()}
          <span style={{ fontSize:11, fontWeight:500, color:"var(--cool)", marginLeft:2 }}>/{sub.cycle}</span>
        </div>
      </div>
      <div className="action-icons" style={{ display:"flex", gap:6, flexShrink:0 }}>
        <button onClick={() => onEdit(sub)} style={{
          width:32, height:32, border:"none", background:"var(--indigo-light)",
          color:"var(--indigo)", borderRadius:8, cursor:"pointer", fontSize:14,
          display:"flex", alignItems:"center", justifyContent:"center",
          transition:"background 0.15s, transform 0.15s",
        }}
          onMouseOver={e=>{ e.currentTarget.style.background="#DDE3FF"; e.currentTarget.style.transform="scale(1.1)"; }}
          onMouseOut={e=>{ e.currentTarget.style.background="var(--indigo-light)"; e.currentTarget.style.transform="scale(1)"; }}>
          ✏️
        </button>
        <button onClick={() => onDelete(sub.id)} style={{
          width:32, height:32, border:"none", background:"var(--rose-light)",
          color:"var(--rose)", borderRadius:8, cursor:"pointer", fontSize:14,
          display:"flex", alignItems:"center", justifyContent:"center",
          transition:"background 0.15s, transform 0.15s",
        }}
          onMouseOver={e=>{ e.currentTarget.style.background="#FFD1D8"; e.currentTarget.style.transform="scale(1.1)"; }}
          onMouseOut={e=>{ e.currentTarget.style.background="var(--rose-light)"; e.currentTarget.style.transform="scale(1)"; }}>
          🗑️
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════════════ */
function EmptyState({ onAdd }) {
  return (
    <div style={{ textAlign:"center", padding:"64px 24px" }} className="animate-fade-in">
      <svg width="160" height="140" viewBox="0 0 160 140" fill="none" style={{ marginBottom:24 }}>
        <rect x="20" y="40" width="120" height="80" rx="14" fill="#EEF2FF" />
        <rect x="34" y="58" width="60" height="8" rx="4" fill="#C7D2FE" />
        <rect x="34" y="74" width="40" height="6" rx="3" fill="#E0E7FF" />
        <rect x="34" y="88" width="50" height="6" rx="3" fill="#E0E7FF" />
        <rect x="110" y="70" width="18" height="18" rx="5" fill="#6366F1" opacity="0.5"/>
        <circle cx="119" cy="35" r="18" fill="#F0FDF4" />
        <path d="M112 35l5 5 9-9" stroke="#10B981" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        <circle cx="30" cy="30" r="8" fill="#FFF1F2"/>
        <text x="27" y="34" fontSize="9" fill="#F43F5E">!</text>
      </svg>
      <div style={{ fontSize:20, fontWeight:700, color:"var(--slate)", marginBottom:8 }}>還沒有任何訂閱</div>
      <div style={{ fontSize:14, color:"var(--cool)", marginBottom:28 }}>開始追蹤你的訂閱服務，掌握每月支出</div>
      <button className="btn-primary animate-pulse-ring" onClick={onAdd} style={{
        background:"var(--indigo)", color:"#fff", border:"none", borderRadius:"var(--radius-sm)",
        padding:"12px 28px", fontSize:14, fontWeight:700, cursor:"pointer",
      }}>
        + 新增第一個訂閱
      </button>
    </div>
  );
}

/* ══════════════════════════════════════════════
   TOGGLE SWITCH
══════════════════════════════════════════════ */
function Toggle({ value, onChange }) {
  return (
    <div onClick={() => onChange(!value)} style={{
      width:44, height:24, background: value ? "var(--indigo)" : "#D1D5DB",
      borderRadius:999, padding:3, cursor:"pointer", position:"relative",
      transition:"background 0.2s",
    }} className="toggle-track">
      <div className="toggle-thumb" style={{
        width:18, height:18, background:"#fff", borderRadius:999,
        boxShadow:"0 1px 4px rgba(0,0,0,0.18)",
        transform: value ? "translateX(20px)" : "translateX(0)",
        position:"relative",
      }} />
    </div>
  );
}

/* ══════════════════════════════════════════════
   AUTOCOMPLETE INPUT
══════════════════════════════════════════════ */
function AutocompleteInput({ value, onChange, error }) {
  const [suggestions, setSuggestions] = useState([]);
  const [open, setOpen] = useState(false);
  const ref = useRef();

  useEffect(() => {
    if (value.length >= 1) {
      const s = SERVICES.filter(s => s.toLowerCase().includes(value.toLowerCase()) && s !== value);
      setSuggestions(s.slice(0,5));
      setOpen(s.length > 0);
    } else { setOpen(false); }
  }, [value]);

  return (

function SubModal({ initial, onClose, onSave }) {
  const blank = { name:"", price:"", cycle:"月", nextDate:"", remind:false, currency:"TWD", noticeDays:7 };
  const [form, setForm] = useState({ ...blank, ...(initial || {}) });
  const [errors, setErrors] = useState({});
  const [shakeFields, setShakeFields] = useState({});
  const [loading, setLoading] = useState(false);
  const [success, setSuccess] = useState(false);
  const [submitError, setSubmitError] = useState("");

  const set = (k,v) => { setForm(f=>({...f,[k]:v})); setErrors(e=>({...e,[k]:""})); };

  function validate() {
    const errs = {};
    if (!form.name.trim()) errs.name = "請輸入服務名稱";
    if (!form.price || isNaN(Number(form.price)) || Number(form.price) <= 0) errs.price = "請輸入有效價格";
    if (!form.nextDate) errs.nextDate = "請選擇下次扣款日";
    if (form.remind && (!form.noticeDays || Number(form.noticeDays) < 0)) errs.noticeDays = "提醒天數需為 0 以上";
    return errs;
  }

  async function handleSubmit() {
    const errs = validate();
    if (Object.keys(errs).length) {
      setErrors(errs);
      const shk = {};
      Object.keys(errs).forEach(k => shk[k] = true);
      setShakeFields(shk);
      setTimeout(() => setShakeFields({}), 500);
      return;
    }
    setSubmitError("");
    setLoading(true);
    try {
      await onSave({ ...form, price: Number(form.price) });
      setLoading(false);
      setSuccess(true);
      setTimeout(() => { onClose(); }, 700);
    } catch (err) {
      setLoading(false);
      setSubmitError(err.message || "儲存失敗，請稍後再試");
    }
  }

  const fieldStyle = (k) => ({
    width:"100%", padding:"10px 12px",
    borderRadius:"var(--radius-sm)", fontSize:14, fontWeight:500,
    background:"var(--white)", color:"var(--slate)",
  });

  return (
    <div className="modal-overlay" style={{
      position:"fixed", inset:0, background:"rgba(15,20,40,0.30)",
      display:"flex", alignItems:"center", justifyContent:"center",
      zIndex:500, padding:16,
    }} onClick={e => { if (e.target===e.currentTarget) onClose(); }}>
      <div className="animate-scale-in" style={{
        background:"rgba(255,255,255,0.96)", backdropFilter:"blur(16px)",
        WebkitBackdropFilter:"blur(16px)",
        borderRadius:"var(--radius-xl)", boxShadow:"var(--shadow-xl)",

          </h2>
          <button onClick={onClose} style={{
            border:"none", background:"var(--bg)", width:32, height:32, borderRadius:8,
            cursor:"pointer", fontSize:16, color:"var(--cool)", display:"flex", alignItems:"center", justifyContent:"center",
            transition:"background 0.15s",
          }}
            onMouseOver={e=>e.currentTarget.style.background="#E5E7EB"}
            onMouseOut={e=>e.currentTarget.style.background="var(--bg)"}>✕</button>
        </div>

        {/* Form */}
        <div style={{ display:"flex", flexDirection:"column", gap:18 }}>
          {/* Service Name */}
          <div className={shakeFields.name?"animate-shake":""}>
            <label style={{ fontSize:12.5, fontWeight:700, color:"var(--cool)", letterSpacing:"0.04em", textTransform:"uppercase", marginBottom:6, display:"block" }}>服務名稱</label>
            <AutocompleteInput value={form.name} onChange={v=>set("name",v)} error={!!errors.name} />
            {errors.name && <span style={{ fontSize:12, color:"var(--rose)", marginTop:4, display:"block", fontWeight:500 }}>⚠ {errors.name}</span>}
          </div>

          {/* Price + Cycle */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr auto", gap:10 }}>

              <input className={`input-field${errors.price?" error":""}`} type="number" min="0"
                value={form.price} onChange={e=>set("price",e.target.value)}

              {errors.price && <span style={{ fontSize:12, color:"var(--rose)", marginTop:4, display:"block", fontWeight:500 }}>⚠ {errors.price}</span>}

            <div>

          {/* Date */}
          <div className={shakeFields.nextDate?"animate-shake":""}>
            <label style={{ fontSize:12.5, fontWeight:700, color:"var(--cool)", letterSpacing:"0.04em", textTransform:"uppercase", marginBottom:6, display:"block" }}>下次扣款日</label>
            <input className={`input-field${errors.nextDate?" error":""}`} type="date"
              value={form.nextDate} onChange={e=>set("nextDate",e.target.value)}

            {errors.nextDate && <span style={{ fontSize:12, color:"var(--rose)", marginTop:4, display:"block", fontWeight:500 }}>⚠ {errors.nextDate}</span>}
          </div>

          {/* Remind */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"var(--bg)", borderRadius:"var(--radius-sm)", padding:"13px 14px" }}>
            <div>
              <div style={{ fontSize:13.5, fontWeight:600, color:"var(--slate)" }}>到期提醒</div>
              <div style={{ fontSize:12, color:"var(--cool)", marginTop:2 }}>
                到期前 {form.noticeDays || 7} 天發送 Email 通知

            </div>
            <Toggle value={form.remind} onChange={v=>set("remind",v)} />
          </div>
        </div>

        {submitError && (
          <div style={{ marginTop:18, fontSize:12.5, fontWeight:600, color:"var(--rose)", textAlign:"center" }}>
            ⚠ {submitError}

        )}

        {/* Submit */}
        <button className="btn-primary" onClick={handleSubmit} disabled={loading||success} style={{

  );

function GridDots() {
  const size = 28, cols = 32, rows = 22;
  const dots = [];
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    const cx = c * size + size/2, cy = r * size + size/2;
    const dist = Math.sqrt(Math.pow(cx - cols*size*0.5, 2) + Math.pow(cy - rows*size*0.45, 2));
    const maxDist = Math.sqrt(Math.pow(cols*size*0.5, 2) + Math.pow(rows*size*0.45, 2));
    const alpha = Math.max(0.03, 0.22 - (dist / maxDist) * 0.22);
    dots.push(<circle key={`${r}-${c}`} cx={cx} cy={cy} r={1.2} fill="white" opacity={alpha} />);
  }
  return (
    <svg style={{ position:"absolute", inset:0, width:"100%", height:"100%", pointerEvents:"none" }} viewBox={`0 0 ${cols*size} ${rows*size}`} preserveAspectRatio="xMidYMid slice">
      {dots}
    </svg>
  );
}

function AvatarMenu({ user, onLogout }) {
  const [open, setOpen] = useState(false);
  const ref = useRef();
  useEffect(() => {
    function handler(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  return (
    <div ref={ref} style={{ position:"relative" }}>
      <div onClick={() => setOpen(o=>!o)} style={{
        width:38, height:38, borderRadius:"50%",
        background:"linear-gradient(135deg, var(--indigo), #8B5CF6)",

/* ══════════════════════════════════════════════

══════════════════════════════════════════════ */
function Dashboard({ onLogout, userName, onAuthLost, onFatal }) {
  const [subs, setSubs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null); // null | "add" | sub object
  const [toast, setToast] = useState(null);
  const [listKey, setListKey] = useState(0);

  const showToast = useCallback((message, type="success") => {
    setToast({ message, type, id: Date.now() });
  }, []);

  const loadSubs = useCallback(async () => {
    setLoading(true);
    try {
      const res = await fetch("/api/subscriptions", {
        headers: { ...authHeaders() },
      });
      if (res.status === 401) {
        onAuthLost();
        return;
      }
      if (!res.ok) throw new Error("載入訂閱失敗，請稍後再試");
      const data = await res.json();
      setSubs(data.map(normalizeFromApi));
    } catch (err) {
      setSubs([]);
      showToast(err.message || "載入失敗", "error");
      if (onFatal) {
        onFatal("載入失敗", "我們暫時無法取得你的訂閱資料，請稍後再試。");
      }
    } finally {
      setLoading(false);
    }
  }, [onAuthLost, showToast, onFatal]);

  useEffect(() => {
    loadSubs();
  }, [loadSubs]);

  async function handleSave(data) {
    const payload = normalizeToApi(data);
    const isAdd = modal === "add";
    const url = isAdd ? "/api/subscriptions" : `/api/subscriptions/${modal.id}`;
    const method = isAdd ? "POST" : "PUT";

    const res = await fetch(url, {
      method,
      headers: { "Content-Type": "application/json", ...authHeaders() },
      body: JSON.stringify(payload),
    });
    if (res.status === 401) {
      onAuthLost();
      throw new Error("請先登入");
    }
    if (!res.ok) throw new Error("儲存失敗，請稍後再試");
    const saved = await res.json();
    const normalized = normalizeFromApi(saved);
    if (isAdd) {
      setSubs(s => [...s, normalized]);
      showToast("訂閱已新增 🎉");
    } else {
      setSubs(s => s.map(x => x.id === normalized.id ? normalized : x));
      showToast("訂閱已更新 ✓");
    }
    setModal(null);
    setListKey(k=>k+1);
  }

  async function handleDelete(id) {
    if (!window.confirm("確定要刪除此訂閱嗎？")) return;
    const res = await fetch(`/api/subscriptions/${id}`, {
      method: "DELETE",
      headers: { ...authHeaders() },
    });
    if (res.status === 401) {
      onAuthLost();
      showToast("請先登入", "error");
      return;
    }
    if (!res.ok) {
      showToast("刪除失敗，請稍後再試", "error");
      return;
    }
    setSubs(s => s.filter(x => x.id !== id));
    showToast("已刪除訂閱", "error");
    setListKey(k=>k+1);
  }

  return (
    <div style={{ minHeight:"100vh", background:"var(--bg)" }}>
      {/* Header */}
      <header className="animate-fade-in" style={{
        background:"var(--white)", boxShadow:"0 1px 0 rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.03)",
        position:"sticky", top:0, zIndex:100,
      }}>
        <div style={{ maxWidth:900, margin:"0 auto", padding:"0 24px", height:64, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{
              width:32, height:32, background:"linear-gradient(135deg,var(--indigo),#8B5CF6)",
              borderRadius:9, display:"flex", alignItems:"center", justifyContent:"center",
              boxShadow:"0 2px 8px rgba(99,102,241,0.30)",
            }}>
              <span style={{ color:"#fff", fontSize:14, fontWeight:800, fontFamily:"'DM Mono',monospace" }}>S</span>
            </div>
            <span style={{ fontSize:18, fontWeight:800, color:"var(--slate)", letterSpacing:"-0.02em" }}>
              Sub<span style={{ color:"var(--indigo)" }}>READY</span>
            </span>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <button className="btn-primary" onClick={() => setModal("add")} style={{
              background:"var(--indigo)", color:"#fff", border:"none",
              borderRadius:"var(--radius-sm)", padding:"9px 18px",
              fontSize:13.5, fontWeight:700, cursor:"pointer",
              display:"flex", alignItems:"center", gap:6,
            }}>
              <span style={{ fontSize:16, lineHeight:1 }}>+</span> 新增訂閱
            </button>
            <AvatarMenu user={userName || "訂閱達人"} onLogout={onLogout} />
          </div>
        </div>
      </header>

      {/* Main */}
      <main style={{ maxWidth:900, margin:"0 auto", padding:"32px 24px" }}>
        <div className="animate-fade-slide-up" style={{ marginBottom:28 }}>
          <h1 style={{ fontSize:26, fontWeight:800, color:"var(--slate)", letterSpacing:"-0.025em" }}>我的訂閱</h1>
          <p style={{ fontSize:14, color:"var(--cool)", marginTop:4 }}>
            {loading ? "載入中..." : `共 ${subs.length} 項服務，掌握每一筆支出`}
          </p>
        </div>

        <OverviewCards subs={subs} />

        {/* Subscription list */}
        {loading ? (
          <div style={{ padding:"36px 12px", textAlign:"center", color:"var(--cool)", fontWeight:600 }}>
            載入訂閱中…
          </div>
        ) : subs.length === 0 ? (
          <EmptyState onAdd={() => setModal("add")} />
        ) : (
          <div key={listKey} style={{ display:"flex", flexDirection:"column", gap:12 }}>
            {subs.map((sub, i) => (
              <SubCard key={sub.id} sub={sub} onEdit={s=>setModal(s)} onDelete={handleDelete} />
            ))}
          </div>
        )}
      </main>

      {/* Modal */}
      {modal !== null && (
        <SubModal
          initial={modal === "add" ? null : modal}
          onClose={() => setModal(null)}
          onSave={handleSave}
        />
      )}

      {/* Toast */}
      {toast && <Toast key={toast.id} message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
}

/* ══════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════ */
function App() {
  const [page, setPage] = useState("login");
  const [userName, setUserName] = useState("訂閱達人");
  const [authNotice, setAuthNotice] = useState(null);
  const [appError, setAppError] = useState(null);

  const handleLogin = () => {
    window.location.href = "/oauth2/authorization/google";
  };

  const handleLogout = () => {
    clearToken();
    setPage("login");
    setAuthNotice({ type:"info", message:"你已成功登出。", action:() => setAuthNotice(null) });
  };

  const handleAuthLost = () => {
    clearToken();
    setPage("login");
    setAuthNotice({ type:"error", message:"登入已過期，請重新登入。", action:() => setAuthNotice(null) });
  };

  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    if (token) {
      setToken(token);
      const cleanUrl = window.location.origin + window.location.pathname;
      window.history.replaceState({}, document.title, cleanUrl);
      setAuthNotice({ type:"success", message:"登入成功，歡迎回來！", action:() => setAuthNotice(null) });
    }

    const existing = getToken();
    if (existing) {
      const payload = decodeJwt(existing);
      if (payload && payload.sub) setUserName(payload.sub);
      setPage("dashboard");
    }
  }, []);

  if (appError) {
    return (
      <ErrorPage
        title={appError.title}
        message={appError.message}
        onRetry={() => { setAppError(null); setPage("dashboard"); }}
        onBack={() => { setAppError(null); setPage("login"); }}
      />
    );
  }

  return page === "login"
    ? <LoginPage onLogin={handleLogin} notice={authNotice} />
    : <Dashboard onLogout={handleLogout} userName={userName} onAuthLost={handleAuthLost} onFatal={(title, message) => setAppError({ title, message })} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
