spring.application.name=Subscription-Tracker
spring.datasource.url=jdbc:postgresql://localhost:5432/subtracker
spring.datasource.username=pigg
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
# Mailtrap
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAILTRAP_USERNAME:}
spring.mail.password=${MAILTRAP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:no-reply@subtracker.com}
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.timezone=${APP_TIMEZONE:Asia/Taipei}
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-minutes=${JWT_EXP_MINUTES:60}

# IMAP settings
app.imap.host=${IMAP_HOST:}
app.imap.port=${IMAP_PORT:993}
app.imap.username=${IMAP_USERNAME:}
app.imap.password=${IMAP_PASSWORD:}
app.imap.ssl=${IMAP_SSL:true}
app.imap.folder=${IMAP_FOLDER:INBOX}

# Mail detection rules
app.mail.detect.lookback-days=2
app.mail.detect.max-messages=200
app.mail.detect.trusted-sender-domains=netflix.com,spotify.com,apple.com,adobe.com,notion.so
app.mail.detect.cancel-keywords=cancel:3,cancelled:3,cancellation:4,subscription cancelled:6
app.mail.detect.fail-keywords=payment failed:5,renewal failed:5,card declined:4
app.mail.detect.cancel-threshold=5
app.mail.detect.fail-threshold=5
app.mail.detect.subject-boost=2
app.mail.detect.sender-boost=2

# JWT settings
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Forwarded headers settings for reverse proxy support
server.forward-headers-strategy=framework